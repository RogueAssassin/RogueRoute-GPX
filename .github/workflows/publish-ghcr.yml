name: Build and publish container

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Push an edge image to GHCR
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: container-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/rogueroute-gpx

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: pnpm
      - id: version
        name: Verify release version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed 's/^v//' VERSION | tr -d '[:space:]')"
          tag="${{ github.event.release.tag_name || github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="edge"
          elif [[ "$tag" != "v$version" ]]; then
            echo "Tag $tag does not match VERSION v$version" >&2
            exit 1
          fi
          bash scripts/version.sh check
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  container:
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.event_name != 'workflow_dispatch' || inputs.publish
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.validate.outputs.version }},enable=${{ github.event_name != 'workflow_dispatch' }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.validate.outputs.version }},enable=${{ github.event_name != 'workflow_dispatch' }}
            type=semver,pattern={{major}},value=v${{ needs.validate.outputs.version }},enable=${{ github.event_name != 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name != 'workflow_dispatch' }}
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=RogueRoute GPX
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/gpx-web/Dockerfile
          platforms: ${{ (github.event_name != 'workflow_dispatch' || inputs.publish) && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
          load: ${{ github.event_name == 'workflow_dispatch' && !inputs.publish }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=v${{ needs.validate.outputs.version }}
            NEXT_PUBLIC_BUILD_TIME=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.12.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  deployment:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Validate release surfaces and shell syntax
        run: |
          bash scripts/version.sh check
          bash -n install.sh rogueroute scripts/osm.sh scripts/osm-region-catalog.sh scripts/version.sh
      - name: Validate Compose configuration
        run: |
          cp .env.example .env
          docker compose --env-file .env -f compose.yaml config -q

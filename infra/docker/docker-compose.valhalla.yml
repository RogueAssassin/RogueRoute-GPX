services:
  gpx-web:
    environment:
      ROUTER_MODE: valhalla
      VALHALLA_URL: http://valhalla:8002
    depends_on:
      - valhalla

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: valhalla
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      use_tiles_ignore_pbf: "False"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8002/status >/dev/null 2>&1 || curl -fsS http://127.0.0.1:8002/status >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - media-net
    volumes:
      - ${VALHALLA_DATA_PATH}:/custom_files

networks:
  media-net:
    external: true

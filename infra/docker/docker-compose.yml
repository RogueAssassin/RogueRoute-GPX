services:
  gpx-web:
    build:
      context: ../..
      dockerfile: apps/gpx-web/Dockerfile
      args:
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:?Set NEXT_SERVER_ACTIONS_ENCRYPTION_KEY in infra/docker/.env. Run ./deploy.sh to auto-generate it.}
        NEXT_PUBLIC_BUILD_TIME: ${NEXT_PUBLIC_BUILD_TIME:-local}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-v11}
    container_name: gpx-web
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      OSRM_SWITCH_ENABLED: ${OSRM_SWITCH_ENABLED:-true}
      OSRM_SWITCH_SCRIPT: ${OSRM_SWITCH_SCRIPT:-/host/rogueroute/switch-osrm-region.sh}
      ROGUEROUTE_HOST_ROOT: /host/rogueroute
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
      NEXT_PUBLIC_BUILD_TIME: ${NEXT_PUBLIC_BUILD_TIME:-local}
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-v11}
    volumes:
      - ../..:/host/rogueroute
      - /var/run/docker.sock:/var/run/docker.sock
      # Required for in-app OSRM region switching. The switch script runs inside
      # the gpx-web container, so it must see the same prepared OSRM files that
      # exist on the host and inside the OSRM container.
      - ${OSRM_DATA_DIR:-/mnt/h/osrm}:${OSRM_DATA_DIR:-/mnt/h/osrm}
    ports:
      - "${HOST_PORT:-9080}:9080"
    networks:
      - media-net

networks:
  media-net:
    external: true

name: rogueroute-gpx

services:
  secrets-init:
    image: ${ROGUEROUTE_IMAGE:-ghcr.io/rogueassassin/rogueroute-gpx}:${ROGUEROUTE_VERSION:-12.5.0}
    container_name: rogueroute-gpx-secrets-init
    restart: "no"
    command:
      - /bin/sh
      - -ec
      - |
        umask 077
        if [ ! -s /run/rogueroute-secrets/manager-token ]; then
          head -c 48 /dev/urandom | base64 > /run/rogueroute-secrets/manager-token
        fi
        chmod 0400 /run/rogueroute-secrets/manager-token
    volumes:
      - manager-secrets:/run/rogueroute-secrets
    networks: [rogueroute]

  web:
    image: ${ROGUEROUTE_IMAGE:-ghcr.io/rogueassassin/rogueroute-gpx}:${ROGUEROUTE_VERSION:-12.5.0}
    container_name: rogueroute-gpx-web
    restart: unless-stopped
    env_file: .env
    environment:
      ROUTER_MODE: osrm
      OSRM_URL: http://osrm:5000
      OSRM_SWITCH_ENABLED: ${OSRM_SWITCH_ENABLED:-true}
      OSRM_MANAGER_URL: ${OSRM_MANAGER_URL:-http://manager:9090}
      NEXT_PUBLIC_APP_VERSION: v${ROGUEROUTE_VERSION:-12.5.0}
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      osrm:
        condition: service_started
      manager:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-9080}:9080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - manager-secrets:/run/rogueroute-secrets:ro
    networks: [rogueroute]

  manager:
    image: ${ROGUEROUTE_IMAGE:-ghcr.io/rogueassassin/rogueroute-gpx}:${ROGUEROUTE_VERSION:-12.5.0}
    container_name: rogueroute-gpx-manager
    restart: unless-stopped
    command: ["node", "/app/manager/server.mjs"]
    env_file: .env
    environment:
      DEPLOYMENT_DIR: /deployment
      MANAGER_DATA_DIR: /data
      OSRM_MANAGER_PORT: 9090
      OSRM_MANAGER_TOKEN_FILE: /run/rogueroute-secrets/manager-token
      OSRM_SWITCH_COOLDOWN_SECONDS: ${OSRM_SWITCH_COOLDOWN_SECONDS:-60}
    depends_on:
      secrets-init:
        condition: service_completed_successfully
    volumes:
      - manager-secrets:/run/rogueroute-secrets:ro
      - type: bind
        source: ./.env
        target: /deployment/.env
      - type: bind
        source: ./compose.yaml
        target: /deployment/compose.yaml
        read_only: true
      - type: bind
        source: ${OSRM_DATA_DIR:-/mnt/h/osrm}
        target: /data
        read_only: true
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [rogueroute]

  osrm:
    image: ${OSRM_IMAGE:-osrm/osrm-backend:latest}
    container_name: rogueroute-gpx-osrm
    restart: on-failure:3
    command: ["osrm-routed", "--algorithm", "mld", "/data/${OSRM_GRAPH:-australia-latest.osrm}"]
    volumes:
      - type: bind
        source: ${OSRM_DATA_DIR:-/mnt/h/osrm}
        target: /data
    ports:
      - "${OSRM_HOST_PORT:-5000}:5000"
    networks: [rogueroute]

networks:
  rogueroute:
    name: rogueroute-gpx
    driver: bridge

volumes:
  manager-secrets:
    name: rogueroute-gpx-manager-secrets

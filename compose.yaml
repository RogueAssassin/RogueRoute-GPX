name: rogueroute-gpx

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  secrets-init:
    image: ${ROGUEROUTE_IMAGE:-ghcr.io/rogueassassin/rogueroute-gpx}:${ROGUEROUTE_VERSION:-12.5.1}
    container_name: rogueroute-gpx-secrets-init
    restart: "no"
    command:
      - /bin/sh
      - -ec
      - |
        umask 077
        if [ ! -s /run/rogueroute-secrets/manager-token ]; then
          head -c 48 /dev/urandom | base64 > /run/rogueroute-secrets/manager-token
        fi
        chmod 0400 /run/rogueroute-secrets/manager-token
    volumes:
      - manager-secrets:/run/rogueroute-secrets
    networks: [rogueroute]
    logging: *default-logging

  web:
    image: ${ROGUEROUTE_IMAGE:-ghcr.io/rogueassassin/rogueroute-gpx}:${ROGUEROUTE_VERSION:-12.5.1}
    container_name: rogueroute-gpx-web
    restart: unless-stopped
    env_file: .env
    environment:
      # Next standalone otherwise binds to Docker's generated hostname, so
      # the loopback health check cannot reach the server.
      HOSTNAME: 0.0.0.0
      ROUTER_MODE: osrm
      OSRM_URL: http://osrm:5000
      OSRM_SWITCH_ENABLED: ${OSRM_SWITCH_ENABLED:-true}
      OSRM_MANAGER_URL: ${OSRM_MANAGER_URL:-http://manager:9090}
      NEXT_PUBLIC_APP_VERSION: v${ROGUEROUTE_VERSION:-12.5.1}
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      osrm:
        condition: service_healthy
      manager:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-9080}:9080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - manager-secrets:/run/rogueroute-secrets:ro
    networks: [rogueroute]
    logging: *default-logging
    labels:
      rogue.dashboard.service: "rogueroute-web"
      rogue.dashboard.monitor-url: "http://rogueroute-gpx-web:9080/api/health"

  manager:
    image: ${ROGUEROUTE_IMAGE:-ghcr.io/rogueassassin/rogueroute-gpx}:${ROGUEROUTE_VERSION:-12.5.1}
    container_name: rogueroute-gpx-manager
    restart: unless-stopped
    command: ["node", "/app/manager/server.mjs"]
    env_file: .env
    environment:
      DEPLOYMENT_DIR: /deployment
      MANAGER_DATA_DIR: /data
      OSRM_MANAGER_PORT: 9090
      OSRM_MANAGER_TOKEN_FILE: /run/rogueroute-secrets/manager-token
      OSRM_SWITCH_COOLDOWN_SECONDS: ${OSRM_SWITCH_COOLDOWN_SECONDS:-60}
    depends_on:
      secrets-init:
        condition: service_completed_successfully
    volumes:
      - manager-secrets:/run/rogueroute-secrets:ro
      - type: bind
        source: ./.env
        target: /deployment/.env
      - type: bind
        source: ./compose.yaml
        target: /deployment/compose.yaml
        read_only: true
      - type: bind
        source: ${OSRM_DATA_DIR:-/mnt/h/osrm}
        target: /data
        read_only: true
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [rogueroute]
    logging: *default-logging
    labels:
      rogue.dashboard.service: "rogueroute-manager"
      rogue.dashboard.monitor-url: "http://rogueroute-gpx-manager:9090/health"

  osrm:
    image: ${OSRM_IMAGE:-ghcr.io/project-osrm/osrm-backend:v26.7.3}
    container_name: rogueroute-gpx-osrm
    restart: unless-stopped
    stop_grace_period: 30s
    command: ["osrm-routed", "--algorithm", "mld", "/data/${OSRM_GRAPH:-australia-latest.osrm}"]
    volumes:
      - type: bind
        source: ${OSRM_DATA_DIR:-/mnt/h/osrm}
        target: /data
    ports:
      - "127.0.0.1:${OSRM_HOST_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD-SHELL", "grep -qa '^Name:[[:space:]]*osrm-routed' /proc/1/status && grep -q ':1388 .* 0A ' /proc/net/tcp*"]
      interval: 15s
      timeout: 3s
      retries: 20
      start_period: 120s
    networks: [rogueroute]
    logging: *default-logging
    labels:
      rogue.dashboard.service: "rogueroute-osrm"
      rogue.dashboard.monitor-url: "http://rogueroute-gpx-web:9080/api/health/osrm"

networks:
  rogueroute:
    name: rogueroute-gpx
    driver: bridge

volumes:
  manager-secrets:
    name: rogueroute-gpx-manager-secrets

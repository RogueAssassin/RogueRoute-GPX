name: rogueroute-gpx

services:
  web:
    image: ${ROGUEROUTE_IMAGE:-ghcr.io/rogueassassin/rogueroute-gpx}:${ROGUEROUTE_VERSION:-12.1.0}
    container_name: rogueroute-gpx-web
    restart: unless-stopped
    env_file: .env
    environment:
      ROUTER_MODE: osrm
      OSRM_URL: http://osrm:5000
      OSRM_SWITCH_ENABLED: "false"
      NEXT_PUBLIC_APP_VERSION: v${ROGUEROUTE_VERSION:-12.1.0}
    depends_on:
      osrm:
        condition: service_started
    ports:
      - "${HOST_PORT:-9080}:9080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [rogueroute]

  osrm:
    image: ${OSRM_IMAGE:-osrm/osrm-backend:latest}
    container_name: rogueroute-gpx-osrm
    restart: on-failure:3
    command: ["osrm-routed", "--algorithm", "mld", "/data/${OSRM_GRAPH:-australia-latest.osrm}"]
    volumes:
      - type: bind
        source: ${OSRM_DATA_DIR:-/mnt/h/osrm}
        target: /data
    ports:
      - "${OSRM_HOST_PORT:-5000}:5000"
    networks: [rogueroute]

networks:
  rogueroute:
    name: rogueroute-gpx
    driver: bridge
